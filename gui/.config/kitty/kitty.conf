# font
font_family      MesloLGS NF
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14

# window
background_opacity      0.80
background_blur         20
window_padding_width    5 0
hide_window_decorations titlebar-only

# shift+enter sends CSI-u sequence so apps (e.g. claude code) can distinguish it from enter
map shift+enter send_text all \x1b[13;2u

# BEGIN_KITTY_THEME
# Catppuccin-Mocha
include current-theme.conf
# END_KITTY_THEME
