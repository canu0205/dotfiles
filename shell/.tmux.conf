# pane navigation with vim-style keys
bind  h select-pane -L
bind  j select-pane -D
bind  k select-pane -U
bind  l select-pane -R

# pane resizing with arrow keys
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5

# vim-style keys inside copy mode
set -g mode-keys vi

# macos cliboard integration
set-option -g set-clipboard on

# vi copy-mode bindings: begin selection / copy to system clipboard
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe "pbcopy"

# H/L to start/end of line (matches vim/ideavimrc)
bind-key -T copy-mode-vi H send -X back-to-indentation
bind-key -T copy-mode-vi L send -X end-of-line
